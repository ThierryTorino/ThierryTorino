name: Generate Snake

on:
  schedule:
    # Roda automaticamente a cada 24 horas (meia-noite)
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão crucial para salvar o arquivo

    steps:
      # Clone do repositório
      - uses: actions/checkout@v3

      # Gera a cobrinha baseada nas contribuições
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_snake=#8B5CF6&color_dots=#bf94ff,#8B5CF6,#7c3aed,#6d28d9,#4c1d95

      # Salva a imagem gerada de volta no repositório (no branch 'output')
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
